name: Build & Release Skill

# On every push that changes the skill (or its version), rebuild the distributable
# ZIP and commit it back. If the version declared in marketplace.json doesn't yet have
# a release, cut a GitHub release with the ZIP attached. Bump the version in
# .claude-plugin/marketplace.json to trigger a new release. The manual workflow_dispatch
# with a bump level remains available as an escape hatch.

on:
  push:
    branches: [main]
    paths:
      - 'revel-webapp-skill/**'
      - '.claude-plugin/marketplace.json'

  workflow_dispatch:
    inputs:
      bump:
        description: 'Force a semver bump from the latest tag (blank = release the marketplace.json version)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build ZIP
        run: |
          cd ${{ github.workspace }}
          rm -f revel-webapp-skill.zip
          zip -r revel-webapp-skill.zip revel-webapp-skill/ \
            -x "revel-webapp-skill/.DS_Store" \
            -x "revel-webapp-skill/**/.DS_Store"

      - name: Commit ZIP
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add revel-webapp-skill.zip
          git diff --cached --quiet || git commit -m "Rebuild revel-webapp-skill.zip [skip ci]"
          git push

      - name: Determine release version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.bump }}" ]; then
            # Manual: bump from the latest existing tag.
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1); [ -z "$LATEST" ] && LATEST="v0.0.0"
            IFS='.' read -r MA MI PA <<< "${LATEST#v}"
            case "${{ inputs.bump }}" in
              major) MA=$((MA+1)); MI=0; PA=0 ;;
              minor) MI=$((MI+1)); PA=0 ;;
              patch) PA=$((PA+1)) ;;
            esac
            TAG="v${MA}.${MI}.${PA}"
          else
            # Automatic: use the version declared in marketplace.json.
            TAG="v$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Skip if this version already has a release or tag (idempotent — no release spam).
          if gh release view "$TAG" >/dev/null 2>&1 || git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release/tag $TAG already exists — skipping release."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will release $TAG."
          fi

      - name: Tag the release commit
        if: steps.ver.outputs.skip == 'false'
        run: |
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - name: Create Release
        if: steps.ver.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          files: revel-webapp-skill.zip
          generate_release_notes: true
